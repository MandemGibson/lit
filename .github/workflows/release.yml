name: Build and Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: lit_cli_v2/go.sum

      - name: Build Binaries
        run: |
          mkdir -p dist
          
          # Compile for macOS (Darwin)
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o dist/lit-darwin-amd64 ./lit_cli_v2
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o dist/lit-darwin-arm64 ./lit_cli_v2
          
          # Compile for Linux
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o dist/lit-linux-amd64 ./lit_cli_v2
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o dist/lit-linux-arm64 ./lit_cli_v2
          
          # Compile for Windows
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o dist/lit-windows-amd64.exe ./lit_cli_v2
          
          # Compress binaries into archives
          cd dist
          tar -czf lit-darwin-amd64.tar.gz lit-darwin-amd64
          tar -czf lit-darwin-arm64.tar.gz lit-darwin-arm64
          tar -czf lit-linux-amd64.tar.gz lit-linux-amd64
          tar -czf lit-linux-arm64.tar.gz lit-linux-arm64
          zip lit-windows-amd64.zip lit-windows-amd64.exe
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
