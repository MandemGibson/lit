name: Build and Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: lit_cli_v2/go.sum

      - name: Build Binaries
        run: |
          mkdir -p dist
          cd lit_cli_v2
          
          # Compile for macOS (Darwin)
          GOOS=darwin GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/lit-darwin-amd64 .
          GOOS=darwin GOARCH=arm64 go build -ldflags="-s -w" -o ../dist/lit-darwin-arm64 .
          
          # Compile for Linux
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/lit-linux-amd64 .
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o ../dist/lit-linux-arm64 .
          
          # Compile for Windows
          GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o ../dist/lit-windows-amd64.exe .
          
          # Compress binaries into archives
          cd ../dist
          tar -czf lit-darwin-amd64.tar.gz lit-darwin-amd64
          tar -czf lit-darwin-arm64.tar.gz lit-darwin-arm64
          tar -czf lit-linux-amd64.tar.gz lit-linux-amd64
          tar -czf lit-linux-arm64.tar.gz lit-linux-arm64
          zip lit-windows-amd64.zip lit-windows-amd64.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Backend of Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTIFICATION_API_KEY: ${{ secrets.RELEASE_NOTIFICATION_API_KEY }}
        run: |
          for i in {1..5}; do
            body=$(gh release view ${{ github.ref_name }} --json body --jq .body) && break || sleep 2
          done
          if [ -z "$body" ]; then
            body="New CLI version ${{ github.ref_name }} has been released."
          fi
          payload=$(jq -n \
            --arg ver "${{ github.ref_name }}" \
            --arg notes "$body" \
            --arg key "$RELEASE_NOTIFICATION_API_KEY" \
            '{version: $ver, changelog: $notes, apiKey: $key}')
          curl -X POST "https://lit-backend-479881079038.europe-west1.run.app/auths/releases-notify" \
            -H "Content-Type: application/json" \
            -d "$payload"
